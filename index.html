<!DOCTYPE html>
<html lang="sr-Latn">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Express restoran Jagodina – kuvana jela, domaća kuhinja, dostava i ketering. Maksima Gorkog 2."
    />
    <title>Express restoran – Jagodina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app">
      <p
        class="app-boot"
        style="
          margin: 0;
          padding: 2rem;
          font-family: system-ui, sans-serif;
          color: #2a211e;
          background: #faf7f3;
          min-height: 100vh;
        "
      >
        Učitavanje sajta… Ako ekran ostane prazan, koristite
        <code style="background: #eee; padding: 0.2rem 0.4rem">npm run dev</code>,
        <code style="background: #eee; padding: 0.2rem 0.4rem">npm run preview</code>
        ili Live Server (prvo <code>npm run build</code>, zatim Go Live sa korenom
        <code>dist</code>). Ne otvarajte <code>dist/index.html</code> dvoklikom.
      </p>
      <noscript>
        <p style="padding: 2rem; font-family: system-ui, sans-serif">
          Potreban je uključen JavaScript da bi sajt radio.
        </p>
      </noscript>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
