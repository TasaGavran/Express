<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="85mm" height="55mm" viewBox="0 0 85 55">
  <title>Express restoran - prednja strana vizit kartice</title>
  <defs>
    <linearGradient id="goldBar" x1="0" y1="0" x2="85" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c9a227"/>
      <stop offset="1" stop-color="#8a7019"/>
    </linearGradient>
  </defs>
  <rect width="85" height="55" fill="#f7f2ea"/>
  <rect width="85" height="2.5" fill="url(#goldBar)"/>
  <!-- Brend: Express | Restoran / Jagodina, centrirano, iste vizuelne linije -->
  <g transform="translate(42.5, 24)">
    <text
      text-anchor="end"
      x="-5.5"
      y="2"
      fill="#14110e"
      font-family="Georgia, Times New Roman, serif"
      font-size="12"
      font-weight="700"
    >Express</text>
    <rect x="-3.8" y="-6" width="0.45" height="14" rx="0.1" fill="#c9a227"/>
    <text
      text-anchor="start"
      x="4.5"
      y="-0.5"
      fill="#8a7019"
      font-family="Georgia, Times New Roman, serif"
      font-size="5"
      font-weight="600"
      letter-spacing="0.14em"
    >RESTORAN</text>
    <text
      text-anchor="start"
      x="4.5"
      y="5.5"
      fill="#5c5349"
      font-family="Arial, Helvetica, sans-serif"
      font-size="3.6"
      font-weight="600"
      letter-spacing="0.12em"
    >JAGODINA</text>
  </g>
  <!-- Slogan, dva reda, centrirano -->
  <text
    x="42.5"
    y="41"
    text-anchor="middle"
    fill="#3d3833"
    font-family="Arial, Helvetica, sans-serif"
    font-size="3.1"
  >Brza kuvana jela, doma&#269;a kuhinja,</text>
  <text
    x="42.5"
    y="46"
    text-anchor="middle"
    fill="#3d3833"
    font-family="Arial, Helvetica, sans-serif"
    font-size="3.1"
  >ketering i dostava.</text>
</svg>
